name: projeto-4 CI

# Escopo: roda apenas quando o projeto-4 da raquel-costa muda (monorepo compartilhado).
on:
  push:
    paths:
      - 'raquel-costa/projeto-4/**'
  pull_request:
    paths:
      - 'raquel-costa/projeto-4/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: raquel-costa/projeto-4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: raquel-costa/projeto-4/requirements.txt
      - name: Instalar dependências
        run: pip install -r requirements.txt
      - name: Rodar testes (sem chamadas à API)
        run: pytest -q
